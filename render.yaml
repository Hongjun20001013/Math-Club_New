# Render Blueprint: https://render.com/docs/blueprint-spec
#
# IMPORTANT — student accounts & progress:
# Free/ephemeral filesystem wipes SQLite on every redeploy.
# You MUST attach a persistent disk (Starter plan) so accounts survive updates.
#
# Render Dashboard checklist (one-time):
#   1. Service → Disks → Add disk: mount path /var/data, size 1 GB
#   2. Environment → DB_PATH = /var/data/sat.db
#   3. Environment → SECRET_KEY = (fixed random string; do NOT delete/recreate)
#   4. After deploy, open /health/db — persistence_ok must be true
#
# Deploy: Render Dashboard → New → Blueprint → connect Math-Club_New repo.
# After first deploy: visit /admin/setup once to create supervisor admin.
services:
  - type: web
    name: novel-prep-sat
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /health
    disk:
      name: sat-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: RENDER
        value: "true"
      - key: SECRET_KEY
        generateValue: true
      - key: DB_PATH
        value: /var/data/sat.db
      - key: SITE_BRAND_NAME
        value: Novel Prep Math Studio
      - key: SITE_BRAND_SHORT
        value: Novel Prep
