# Render Blueprint: https://render.com/docs/blueprint-spec
#
# CRITICAL — accounts & student progress live in SQLite on the persistent disk.
# If Disks is empty or DB_PATH is wrong, every deploy wipes Jack/staff/student accounts.
#
# Render Dashboard: keep novel-prep-sat only (Math-Club_New → novel-prep-sat-0f9q.onrender.com).
# Delete any duplicate services (e.g. novel-prep-math, old novel-prep-sat-sf9o instances) in Settings.
#   1. Disks → Add: mount /var/data, 1 GB
#   2. Environment → DB_PATH=/var/data/sat.db  RENDER=true
#   3. Manual Deploy once after disk is attached
#   4. /health/db must show persistence_ok:true, user_count >= 1, backup_count >= 0
# Backups: /var/data/backups/sat-*.db (auto every 4h; +1h after account changes). Seed: data/render_users_seed.json + disk snapshot users_seed_latest.json
services:
  - type: web
    name: novel-prep-sat
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120 --graceful-timeout 30 --keep-alive 5
    healthCheckPath: /health
    disk:
      name: sat-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: RENDER
        value: "true"
      - key: SECRET_KEY
        generateValue: true
      - key: DB_PATH
        value: /var/data/sat.db
      - key: SITE_BRAND_NAME
        value: Novel Prep Math Studio
      - key: SITE_BRAND_SHORT
        value: Novel Prep
      - key: DESMOS_API_KEY
        sync: false
