# Render Blueprint: https://render.com/docs/blueprint-spec
#
# SECRET_KEY is auto-generated on first deploy (see envVars below).
# Set SITE_BRAND_NAME (and related SITE_* vars) in the dashboard before sharing with students.
# Optional: DESMOS_API_KEY in the dashboard for the graphing calculator.
#
# SQLite is ephemeral on the free tier (data can reset on redeploy / spin-down).
# For durable SQLite, use a paid instance with a Persistent Disk and set e.g.:
#   DB_PATH=/var/data/sat.db
# Or use Render Postgres and migrate off SQLite later.
services:
  - type: web
    name: novel-prep-sat
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13
      - key: SECRET_KEY
        generateValue: true
