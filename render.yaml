# Render Blueprint: https://render.com/docs/blueprint-spec
#
# CRITICAL — accounts & student progress live in SQLite on the persistent disk.
# If Disks is empty or DB_PATH is wrong, every deploy wipes Jack/staff/student accounts.
#
# Render Dashboard (novel-prep-sat only — delete duplicate novel-prep-math):
#   1. Disks → Add: mount /var/data, 1 GB
#   2. Environment → DB_PATH=/var/data/sat.db  RENDER=true
#   3. Manual Deploy once after disk is attached
#   4. /health/db must show persistence_ok:true, user_count >= 1
# Backups: /var/data/backups/sat-*.db (auto, every 6h). Account seed: data/render_users_seed.json
services:
  - type: web
    name: novel-prep-sat
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /health
    disk:
      name: sat-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: RENDER
        value: "true"
      - key: SECRET_KEY
        generateValue: true
      - key: DB_PATH
        value: /var/data/sat.db
      - key: SITE_BRAND_NAME
        value: Novel Prep Math Studio
      - key: SITE_BRAND_SHORT
        value: Novel Prep
