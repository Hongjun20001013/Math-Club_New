{% extends "base.html" %}
{% block content %}

<div class="np-page-shell">
<div class="practice-container">

    <div class="nav-bar">
        <a href="/practice/{{ unit }}/{{ qnum - 1 }}" class="nav-btn">← Previous</a>
        <a href="/practice/{{ unit }}/{{ qnum + 1 }}" class="nav-btn">Next →</a>
    </div>

    <div class="question-layout">
        <div class="stem">
            {{ q.stem|safe }}
        </div>

        <div class="choices">
            {% for c in q.choices %}
            <label class="choice-card">
                <input type="radio" name="choice">
                <span class="choice-text">{{ c|safe }}</span>
            </label>
            {% endfor %}
        </div>
    </div>

</div>
</div>

{% endblock %}
