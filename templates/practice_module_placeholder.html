{% extends "base.html" %}

{% block content %}
<div class="np-page-shell">
<div class="np-sat-atelier np-mod-placeholder">
    <nav class="np-atelier-rail" aria-label="SAT navigation">
        <a href="{{ url_for('practice') }}">SAT modules</a>
        <span class="np-atelier-rail-sep">·</span>
        <span class="np-atelier-rail-current">{{ title }}</span>
    </nav>
    <header class="np-atelier-hero glass-panel np-glass mp-animate-in">
        <div class="np-sh-hero-noise" aria-hidden="true"></div>
        <div>
            <span class="np-atelier-pill np-atelier-pill--soon">{{ pill|default("Coming soon") }}</span>
            <h1>{{ title }}</h1>
            <p class="np-atelier-hero-lead">{{ lead }}</p>
        </div>
    </header>
</div>
</div>
{% endblock %}
