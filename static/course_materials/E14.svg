    <line x1="12" y1="120" x2="408" y2="120" class="grid"/>
    <line x1="12" y1="96" x2="408" y2="96" class="grid"/>
    <line x1="12" y1="72" x2="408" y2="72" class="grid"/>
    <line x1="12" y1="48" x2="408" y2="48" class="grid"/>
    <line x1="12" y1="288" x2="408" y2="288" class="grid"/>
    <line x1="12" y1="12" x2="12" y2="300" class="grid"/>
    <line x1="36" y1="12" x2="36" y2="300" class="grid"/>
    <line x1="60" y1="12" x2="60" y2="300" class="grid"/>
    <line x1="84" y1="12" x2="84" y2="300" class="grid"/>
    <line x1="108" y1="12" x2="108" y2="300" class="grid"/>
    <line x1="132" y1="12" x2="132" y2="300" class="grid"/>
    <line x1="156" y1="12" x2="156" y2="300" class="grid"/>
    <line x1="180" y1="12" x2="180" y2="300" class="grid"/>
    <line x1="204" y1="12" x2="204" y2="300" class="grid"/>
    <line x1="228" y1="12" x2="228" y2="300" class="grid"/>
    <line x1="252" y1="12" x2="252" y2="300" class="grid"/>
    <line x1="276" y1="12" x2="276" y2="300" class="grid"/>
    <line x1="300" y1="12" x2="300" y2="300" class="grid"/>
