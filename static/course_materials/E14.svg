<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 280" role="img" aria-label="Linear graph with negative slope">
  <rect width="360" height="280" fill="#ffffff"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#374151"/>
    </marker>
  </defs>
  <line x1="40" y1="220" x2="320" y2="220" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="40" y1="220" x2="40" y2="30" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="312" y="238" font-family="system-ui,sans-serif" font-size="12" fill="#374151">x</text>
  <text x="18" y="38" font-family="system-ui,sans-serif" font-size="12" fill="#374151">y</text>
  <!-- grid -->
  <g stroke="#e5e7eb" stroke-width="1">
    <line x1="40" y1="170" x2="320" y2="170"/>
    <line x1="40" y1="120" x2="320" y2="120"/>
    <line x1="40" y1="70" x2="320" y2="70"/>
    <line x1="90" y1="30" x2="90" y2="220"/>
    <line x1="140" y1="30" x2="140" y2="220"/>
    <line x1="190" y1="30" x2="190" y2="220"/>
    <line x1="240" y1="30" x2="240" y2="220"/>
    <line x1="290" y1="30" x2="290" y2="220"/>
  </g>
  <!-- y = -1/4 x + 2, scale 25px per unit, origin (140,170) -->
  <line x1="40" y1="220" x2="320" y2="70" stroke="#5b4dff" stroke-width="3" stroke-linecap="round"/>
  <circle cx="140" cy="170" r="4" fill="#5b4dff"/>
  <text x="148" y="164" font-family="system-ui,sans-serif" font-size="11" fill="#4338ca">(0, 2)</text>
  <circle cx="240" cy="120" r="4" fill="#5b4dff"/>
  <text x="248" y="114" font-family="system-ui,sans-serif" font-size="11" fill="#4338ca">(4, 1)</text>
</svg>
