  <text x="8" y="268" class="label">0</text>
  <text x="118" y="278" class="label">-5</text>
  <text x="244" y="278" class="label">5</text>
  <text x="112" y="128" class="label">5</text>

  <!-- y = -1/4 x + 2 -->
