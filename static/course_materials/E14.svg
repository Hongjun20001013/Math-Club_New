      .label { font-family: "Helvetica Neue", Arial, sans-serif; font-size: 13px; fill: #333; }
      .line { stroke: #c74440; stroke-width: 2.8; stroke-linecap: round; }
      .tip { font-family: "Times New Roman", Georgia, serif; font-size: 13px; fill: #222; }
    </style>
  </defs>
  <rect width="420" height="320" fill="#fff"/>

  <g>
    <line x1="12" y1="264" x2="408" y2="264" class="grid"/>
    <line x1="12" y1="240" x2="408" y2="240" class="grid"/>
    <line x1="12" y1="216" x2="408" y2="216" class="grid"/>
