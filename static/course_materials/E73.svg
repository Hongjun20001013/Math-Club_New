<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 260" role="img" aria-label="Total rainfall versus time">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#374151"/>
    </marker>
  </defs>
  <rect width="360" height="260" fill="#ffffff"/>
  <!-- axes -->
  <line x1="48" y1="210" x2="320" y2="210" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="48" y1="210" x2="48" y2="36" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="318" y="228" font-family="system-ui,sans-serif" font-size="11" fill="#374151">Time (hours)</text>
  <text x="8" y="44" font-family="system-ui,sans-serif" font-size="11" fill="#374151" transform="rotate(-90 8 44)">Total Rainfall (cm)</text>
  <!-- tick labels x: 1-5 -->
  <g font-family="system-ui,sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">
    <text x="98" y="225">1</text>
    <text x="148" y="225">2</text>
    <text x="198" y="225">3</text>
    <text x="248" y="225">4</text>
    <text x="298" y="225">5</text>
  </g>
  <!-- tick labels y: 1-3 -->
  <g font-family="system-ui,sans-serif" font-size="10" fill="#6b7280" text-anchor="end">
    <text x="42" y="164">1</text>
    <text x="42" y="114">2</text>
    <text x="42" y="64">3</text>
  </g>
  <!-- scale: 50px per unit; origin (48,210) -->
  <!-- segment 1: (0,0) to (2,2) blue -->
  <line x1="48" y1="210" x2="148" y2="110" stroke="#2563eb" stroke-width="3" stroke-linecap="round"/>
  <!-- segment 2: (2,2) to (4,2) gray -->
  <line x1="148" y1="110" x2="248" y2="110" stroke="#6b7280" stroke-width="3" stroke-linecap="round"/>
  <!-- segment 3: (4,2) to (5,2.5) orange -->
  <line x1="248" y1="110" x2="298" y2="85" stroke="#f97316" stroke-width="3" stroke-linecap="round"/>
  <!-- rate labels -->
  <text x="98" y="148" font-family="system-ui,sans-serif" font-size="10" fill="#2563eb">+1 cm/hr</text>
  <text x="198" y="100" font-family="system-ui,sans-serif" font-size="10" fill="#6b7280">0 cm/hr</text>
  <text x="268" y="92" font-family="system-ui,sans-serif" font-size="10" fill="#f97316">slow rise</text>
</svg>
