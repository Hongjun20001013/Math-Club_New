<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 300" role="img" aria-label="Transformations of y equals 2x plus 1">
  <rect width="520" height="300" fill="#ffffff"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#374151"/>
    </marker>
  </defs>
  <line x1="50" y1="240" x2="480" y2="240" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="50" y1="240" x2="50" y2="30" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="468" y="258" font-family="system-ui,sans-serif" font-size="12" fill="#374151">x</text>
  <text x="28" y="38" font-family="system-ui,sans-serif" font-size="12" fill="#374151">y</text>
  <!-- origin (50,240), 30px per unit -->
  <!-- y=2x+1 purple -->
  <line x1="50" y1="210" x2="350" y2="30" stroke="#5b4dff" stroke-width="2.5" stroke-linecap="round"/>
  <!-- y=2x+4 blue -->
  <line x1="50" y1="120" x2="350" y2="-60" stroke="#2563eb" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
  <!-- y=-2x+1 orange -->
  <line x1="50" y1="210" x2="350" y2="450" stroke="#f97316" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
  <!-- y=4x+1 green -->
  <line x1="50" y1="210" x2="200" y2="30" stroke="#059669" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
  <g font-family="system-ui,sans-serif" font-size="11">
    <rect x="300" y="42" width="190" height="88" rx="10" fill="#f8f7ff" stroke="#e0e7ff"/>
    <circle cx="318" cy="62" r="5" fill="#5b4dff"/><text x="330" y="66" fill="#374151">y = 2x + 1</text>
    <circle cx="318" cy="82" r="5" fill="#2563eb"/><text x="330" y="86" fill="#374151">y = 2x + 4</text>
    <circle cx="318" cy="102" r="5" fill="#f97316"/><text x="330" y="106" fill="#374151">y = -2x + 1</text>
    <circle cx="318" cy="122" r="5" fill="#059669"/><text x="330" y="126" fill="#374151">y = 4x + 1</text>
  </g>
</svg>
